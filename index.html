<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chord Atlas Library Lab</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <p class="eyebrow">Chord Atlas v2 / Library Lab</p>
        <h1>コードライブラリ確認UI</h1>
        <p class="lead">使用頻度・難易度・ジャズ適性でソートできる、新しいコードフォームライブラリの試作版です。</p>
      </div>
      <div class="stats" id="stats"></div>
    </header>

    <section class="controls">
      <label>Root
        <select id="rootSelect"></select>
      </label>
      <label>Quality
        <select id="qualitySelect"></select>
      </label>
      <label>Sort
        <select id="sortSelect">
          <option value="recommended">おすすめ</option>
          <option value="easy">難易度が低い</option>
          <option value="popular">使用頻度</option>
          <option value="jazz">ジャズ向け</option>
          <option value="lowFret">低フレット</option>
        </select>
      </label>
      <label>Difficulty
        <select id="difficultySelect">
          <option value="all">すべて</option>
          <option value="1">1以下</option>
          <option value="2">2以下</option>
          <option value="3">3以下</option>
          <option value="4">4以下</option>
          <option value="5">5以下</option>
        </select>
      </label>
      <label class="check"><input id="jazzOnly" type="checkbox" /> Jazzタグのみ</label>
      <label class="check"><input id="rootlessOk" type="checkbox" checked /> Rootless許可</label>
    </section>

    <section class="result-head">
      <h2 id="resultTitle">候補</h2>
      <p id="resultMeta"></p>
    </section>

    <section class="grid" id="resultGrid"></section>
  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
