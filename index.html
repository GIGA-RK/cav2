<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Chord Atlas v2 / Compact Search UI</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">CHORD ATLAS V2</p>
        <h1>コード検索</h1>
      </div>
      <div class="stats compact-stats">
        <div><strong id="templateCount">0</strong><span>forms</span></div>
        <div><strong id="qualityCount">0</strong><span>types</span></div>
        <div><strong id="jazzCount">0</strong><span>jazz</span></div>
      </div>
    </header>

    <section class="quick-panel" aria-label="main filters">
      <div class="quick-grid">
        <label>Root<select id="rootSelect"></select></label>
        <label class="quality-control">Quality<select id="qualitySelect" class="hidden-select" tabindex="-1" aria-hidden="true"></select><button class="quality-button" id="qualityButton" type="button" aria-haspopup="dialog" aria-expanded="false"><span id="qualityButtonText">maj7</span><span aria-hidden="true">▾</span></button></label>
        <label>Bass<select id="bassSelect"></select></label>
        <label>Sort<select id="sortSelect"></select></label>
      </div>
      <details class="advanced">
        <summary>詳細フィルタ</summary>
        <div class="advanced-grid">
          <label>Difficulty<select id="difficultySelect"></select></label>
          <label>Family<select id="familySelect"></select></label>
          <label>Usage<select id="usageSelect"></select></label>
          <label>Level<select id="levelSelect"></select></label>
          <label>Voice<select id="voiceSelect"></select></label>
          <label class="check"><input type="checkbox" id="jazzOnly" /> Jazzタグのみ</label>
          <label class="check"><input type="checkbox" id="allowRootless" checked /> Rootless許可</label>
        </div>
      </details>
    </section>

    <div class="quality-overlay" id="qualityOverlay" hidden></div>
    <section class="quality-palette" id="qualityPalette" aria-hidden="true" role="dialog" aria-label="Quality selector">
      <div class="palette-head">
        <div>
          <p class="palette-kicker">QUALITY</p>
          <h2>コードタイプ</h2>
        </div>
        <button class="palette-close" id="qualityClose" type="button" aria-label="Close">×</button>
      </div>
      <div class="palette-section">
        <p class="palette-section-title">よく使う</p>
        <div class="quality-frequent" id="qualityFrequent" aria-label="Frequent qualities"></div>
      </div>
      <div class="palette-section">
        <p class="palette-section-title">カテゴリ</p>
        <div class="quality-tabs" id="qualityTabs" aria-label="Quality categories"></div>
      </div>
      <div class="quality-list" id="qualityList" aria-label="Quality options"></div>
    </section>

    <section class="result-head">
      <div>
        <h2 id="currentChord">Cmaj7</h2>
        <p id="resultMeta">0件</p>
      </div>
      <button class="density-btn" id="densityBtn" type="button" aria-pressed="false">Compact</button>
    </section>

    <section id="cards" class="grid" aria-live="polite"></section>
  </main>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
